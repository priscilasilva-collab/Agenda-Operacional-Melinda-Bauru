<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Agenda Me.linda Bauru</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:linear-gradient(135deg,#d4147a,#5a0f73);
color:white;
text-align:center;
padding:20px;
}

button.excluir{
background:#ffb3b3;
border:none;
padding:3px 6px;
border-radius:4px;
font-size:11px;
cursor:pointer;
margin-top:5px;
}

.logo{
width:140px;
margin-bottom:10px;
border-radius:100px;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:20px;
}

.controls{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#6b1a88;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#8c28b0;
}

.whatsapp{
background:#25D366;
}

.calendar-header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:15px;
font-weight:bold;
font-size:20px;
}

.calendar-header button{
background:#6b1a88;
color:white;
border:none;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:5px;
font-weight:bold;
text-align:center;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
background:white;
min-height:140px;
border-radius:10px;
padding:6px;
box-shadow:0 0 6px rgba(0,0,0,0.08);
}

.day-number{
font-weight:bold;
margin-bottom:4px;
}

.event{
margin-top:5px;
padding:6px;
border-radius:6px;
font-size:12px;
cursor:grab;
}

.reuniao{
background:#E6D9F2;
color:#4A2D73;
}

.treinamento{
background:#FADADD;
color:#7A2F3A;
}

.reciclagem{
background:#DFF5E3;
color:#2F6B3C;
}

.integracao{
background:#FFF1CC;
color:#8A6A00;
}

</style>

</head>

<body>

<header>

<img src="logo-melinda.png" class="logo">

<h1>Agenda de Treinamentos</h1>

<h3>Equipe Me.linda Bauru</h3>

</header>

<div class="container" id="areaCalendario">

<div class="controls">

<input type="date" id="data">

<select id="tipo">
<option value="reuniao">Reunião</option>
<option value="treinamento">Treinamento</option>
<option value="reciclagem">Reciclagem</option>
<option value="integracao">Integração</option>
</select>

<input type="text" id="descricao" placeholder="Descrição do evento">

<input type="text" id="participantes" placeholder="Participantes (ex: Ana, Julia, Marcos)">

<button onclick="addEvent()">Adicionar</button>

<button onclick="exportPDF()">Exportar PDF</button>

<button class="whatsapp" onclick="gerarImagemWhatsapp()">📱 WhatsApp</button>

</div>

<div class="calendar-header">

<button onclick="mesAnterior()">◀</button>

<div id="mesAtual"></div>

<button onclick="mesSeguinte()">▶</button>

</div>

<div class="weekdays">
<div>Dom</div>
<div>Seg</div>
<div>Ter</div>
<div>Qua</div>
<div>Qui</div>
<div>Sex</div>
<div>Sáb</div>
</div>

<div id="calendar" class="calendar"></div>

</div>

<script>

let calendar = document.getElementById("calendar");

let dataAtual = new Date();
let mesAtual = dataAtual.getMonth();
let anoAtual = dataAtual.getFullYear();

const nomesMeses=[
"Janeiro","Fevereiro","Março","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
];

function gerarCalendario(){

let diasMes=new Date(anoAtual,mesAtual+1,0).getDate();
let primeiroDia=new Date(anoAtual,mesAtual,1).getDay();

document.getElementById("mesAtual").innerText=
nomesMeses[mesAtual]+" "+anoAtual;

calendar.innerHTML="";

for(let i=0;i<primeiroDia;i++){
let vazio=document.createElement("div");
calendar.appendChild(vazio);
}

for(let i=1;i<=diasMes;i++){

let div=document.createElement("div");

div.className="day";
div.id="day-"+i;

div.innerHTML="<div class='day-number'>"+i+"</div>";

div.addEventListener("dragover",function(e){
e.preventDefault();
});

div.addEventListener("drop",function(e){

e.preventDefault();

const dragging=document.querySelector(".dragging");

if(dragging){
div.appendChild(dragging);
saveEvents();
}

});

calendar.appendChild(div);

}

}

function gerarImagemWhatsapp(){

const area=document.getElementById("areaCalendario");

html2canvas(area).then(canvas=>{

let link=document.createElement("a");

link.download="agenda-melinda.png";
link.href=canvas.toDataURL();

link.click();

});

}

function addEvent(){

let data=document.getElementById("data").value;
let tipo=document.getElementById("tipo").value;
let descricao=document.getElementById("descricao").value;
let participantes=document.getElementById("participantes").value;

if(!data || !descricao){
alert("Preencha os campos");
return;
}

let dia = parseInt(data.split("-")[2]);

let evento=document.createElement("div");

evento.className="event "+tipo;
evento.draggable=true;

evento.innerHTML="<strong>"+descricao+"</strong><br>👥 "+participantes;

let botaoExcluir=document.createElement("button");
botaoExcluir.className="excluir";
botaoExcluir.innerText="Excluir";

botaoExcluir.onclick=function(e){

e.stopPropagation();

if(confirm("Deseja excluir este evento")){
evento.remove();
saveEvents();
}

};

evento.appendChild(botaoExcluir);

document.getElementById("day-"+dia).appendChild(evento);

saveEvents();

}

function mesAnterior(){

mesAtual--;

if(mesAtual<0){
mesAtual=11;
anoAtual--;
}

gerarCalendario();
loadEvents();

}

function mesSeguinte(){

mesAtual++;

if(mesAtual>11){
mesAtual=0;
anoAtual++;
}

gerarCalendario();
loadEvents();

}

function exportPDF(){

const element=document.querySelector(".container");

html2pdf().from(element).save("agenda-melinda.pdf");

}

function saveEvents(){

let events=document.querySelector(".calendar").innerHTML;

localStorage.setItem("melindaAgenda",events);

}

function loadEvents(){

let saved=localStorage.getItem("melindaAgenda");

if(saved){
document.querySelector(".calendar").innerHTML=saved;
}

}

window.onload=function(){

gerarCalendario();
loadEvents();

};

</script>

</body>
</html>
